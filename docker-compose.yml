version: '3.7'
services:
  app:
    env_file:
      - .env
    build:
      context: .
      # dockerfile: Dockerfile # Use Dockerfile for production
      dockerfile: Dockerfile.dev # Use Dockerfile.dev for development
    container_name: authentication-app
    ports:
      - "8080:8080"
      - "5005:5005"  # Debug port for development
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - TZ=UTC
    volumes:
      - ./logs:/app/logs
      - ./tmp:/tmp
      - ./uploads:/app/uploads # persist user-uploaded files
      - .:/app # only for development
      - ~/.m2:/root/.m2 # only for development
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
      mailhog:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app-network
  mysql:
    image: mysql:8.0
    container_name: creator-platform-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-123456}
      - MYSQL_DATABASE=spring_project
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
  mailhog:
    image: 'mailhog/mailhog:v1.0.1'
    container_name: authentication-mail
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    ports:
      - "1025:1025" # SMTP server port
      - "8025:8025" # Web interface port
    restart: unless-stopped
    networks:
      - app-network
  redis:
    image: redis:7.2-alpine
    container_name: authentication-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - .redis/data:/data:rw
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  mysql_data:
    driver: local
