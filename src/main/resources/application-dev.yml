spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/spring_project}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - com.samuel.app.platform.exception.PlatformApiException
          - com.samuel.app.platform.exception.PlatformConnectionException
        ignore-exceptions:
          - com.samuel.app.platform.exception.QuotaExceededException
    instances:
      youtube-api:
        base-config: default
      tiktok-api:
        base-config: default
      instagram-api:
        base-config: default
      facebook-api:
        base-config: default

  ratelimiter:
    instances:
      youtube-api:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 5s
      tiktok-api:
        limit-for-period: 50
        limit-refresh-period: 60s
        timeout-duration: 5s
      instagram-api:
        limit-for-period: 200
        limit-refresh-period: 3600s
        timeout-duration: 10s
      facebook-api:
        limit-for-period: 200
        limit-refresh-period: 3600s
        timeout-duration: 10s

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.samuel.app.platform.exception.PlatformApiException
        ignore-exceptions:
          - com.samuel.app.platform.exception.QuotaExceededException
          - com.samuel.app.platform.exception.RateLimitException
    instances:
      youtube-api:
        base-config: default
      tiktok-api:
        base-config: default
      instagram-api:
        base-config: default
      facebook-api:
        base-config: default

jwt:
  secret: ${JWT_SECRET:changeme-in-production-use-env-var}

app:
  mail:
    from: ${MAIL_FROM:noreply@spring-project.local}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  auth:
    access-token-expiry: 900
    refresh-token-expiry: 604800
    lockout-threshold: 5
    lockout-duration: 15

youtube:
  api-key: ${YOUTUBE_API_KEY:your-youtube-api-key}
  client-id: ${YOUTUBE_CLIENT_ID:your-client-id}
  client-secret: ${YOUTUBE_CLIENT_SECRET:your-client-secret}
  redirect-uri: ${YOUTUBE_REDIRECT_URI:http://localhost:8080/api/v1/platforms/youtube/callback}

tiktok:
  client-key: ${TIKTOK_CLIENT_KEY:your-tiktok-client-key}
  client-secret: ${TIKTOK_CLIENT_SECRET:your-tiktok-client-secret}
  redirect-uri: ${TIKTOK_REDIRECT_URI:http://localhost:8080/api/v1/platforms/tiktok/callback}

instagram:
  client-id: ${INSTAGRAM_CLIENT_ID:your-instagram-client-id}
  client-secret: ${INSTAGRAM_CLIENT_SECRET:your-instagram-client-secret}
  redirect-uri: ${INSTAGRAM_REDIRECT_URI:http://localhost:8080/api/v1/platforms/instagram/callback}

facebook:
  client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
  client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
  redirect-uri: ${FACEBOOK_REDIRECT_URI:http://localhost:8080/api/v1/platforms/facebook/callback}

platform:
  token-encryption-key: ${PLATFORM_TOKEN_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  endpoints:
    youtube:
      oauth-url: ${YOUTUBE_OAUTH_URL:https://accounts.google.com/o/oauth2/v2/auth}
      token-url: ${YOUTUBE_TOKEN_URL:https://oauth2.googleapis.com/token}
      channel-url: ${YOUTUBE_CHANNEL_URL:https://www.googleapis.com/youtube/v3/channels}
      upload-url: ${YOUTUBE_UPLOAD_URL:https://www.googleapis.com/upload/youtube/v3/videos}
      analytics-url: ${YOUTUBE_ANALYTICS_URL:https://youtubeanalytics.googleapis.com/v2/reports}
      video-base-url: ${YOUTUBE_VIDEO_BASE_URL:https://www.youtube.com/watch?v=}
      scopes: ${YOUTUBE_SCOPES:https://www.googleapis.com/auth/youtube.readonly https://www.googleapis.com/auth/youtube.upload https://www.googleapis.com/auth/yt-analytics.readonly}
    tiktok:
      auth-url: ${TIKTOK_AUTH_URL:https://www.tiktok.com/v2/auth/authorize/}
      token-url: ${TIKTOK_TOKEN_URL:https://open.tiktokapis.com/v2/oauth/token/}
      user-info-url: ${TIKTOK_USER_INFO_URL:https://open.tiktokapis.com/v2/user/info/?fields=open_id,display_name,follower_count}
      scopes: ${TIKTOK_SCOPES:user.info.profile,user.info.stats}
    instagram:
      oauth-url: ${INSTAGRAM_OAUTH_URL:https://www.facebook.com/v18.0/dialog/oauth}
      token-url: ${INSTAGRAM_TOKEN_URL:https://graph.facebook.com/v18.0/oauth/access_token}
      pages-url: ${INSTAGRAM_PAGES_URL:https://graph.facebook.com/v18.0/me/accounts}
      graph-url-template: ${INSTAGRAM_GRAPH_URL_TEMPLATE:https://graph.facebook.com/v18.0/%s}
      user-info-url: ${INSTAGRAM_USER_INFO_URL:https://graph.facebook.com/v18.0/me?fields=id}
      scopes: ${INSTAGRAM_SCOPES:instagram_basic,pages_read_engagement,pages_show_list}
    facebook:
      oauth-url: ${FACEBOOK_OAUTH_URL:https://www.facebook.com/v18.0/dialog/oauth}
      token-url: ${FACEBOOK_TOKEN_URL:https://graph.facebook.com/v18.0/oauth/access_token}
      pages-url: ${FACEBOOK_PAGES_URL:https://graph.facebook.com/v18.0/me/accounts}
      page-detail-url-template: ${FACEBOOK_PAGE_DETAIL_URL_TEMPLATE:https://graph.facebook.com/v18.0/%s?fields=id,name,fan_count,category}
      page-info-url-template: ${FACEBOOK_PAGE_INFO_URL_TEMPLATE:https://graph.facebook.com/v18.0/%s?fields=id,name}
      scopes: ${FACEBOOK_SCOPES:pages_show_list,pages_read_engagement,pages_manage_posts}
