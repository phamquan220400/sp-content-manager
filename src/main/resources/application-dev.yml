spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/spring_project}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: ${JWT_SECRET:changeme-in-production-use-env-var}

app:
  mail:
    from: noreply@spring-project.local
  frontend:
    base-url: http://localhost:4200
  auth:
    access-token-expiry: 900
    refresh-token-expiry: 604800
    lockout-threshold: 5
    lockout-duration: 15
