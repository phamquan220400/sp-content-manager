spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/spring_project}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - com.samuel.app.platform.exception.PlatformApiException
          - com.samuel.app.platform.exception.PlatformConnectionException
        ignore-exceptions:
          - com.samuel.app.platform.exception.QuotaExceededException
    instances:
      youtube-api:
        base-config: default
      tiktok-api:
        base-config: default
      instagram-api:
        base-config: default
      facebook-api:
        base-config: default

  ratelimiter:
    instances:
      youtube-api:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 5s
      tiktok-api:
        limit-for-period: 50
        limit-refresh-period: 60s
        timeout-duration: 5s
      instagram-api:
        limit-for-period: 200
        limit-refresh-period: 3600s
        timeout-duration: 10s
      facebook-api:
        limit-for-period: 200
        limit-refresh-period: 3600s
        timeout-duration: 10s

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.samuel.app.platform.exception.PlatformApiException
        ignore-exceptions:
          - com.samuel.app.platform.exception.QuotaExceededException
          - com.samuel.app.platform.exception.RateLimitException
    instances:
      youtube-api:
        base-config: default
      tiktok-api:
        base-config: default
      instagram-api:
        base-config: default
      facebook-api:
        base-config: default

jwt:
  secret: ${JWT_SECRET:changeme-in-production-use-env-var}

app:
  mail:
    from: ${MAIL_FROM:noreply@spring-project.local}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  auth:
    access-token-expiry: 900
    refresh-token-expiry: 604800
    lockout-threshold: 5
    lockout-duration: 15

youtube:
  client-id: ${YOUTUBE_CLIENT_ID:your-client-id}
  client-secret: ${YOUTUBE_CLIENT_SECRET:your-client-secret}
  redirect-uri: ${YOUTUBE_REDIRECT_URI:http://localhost:8080/api/v1/platforms/youtube/callback}

platform:
  token-encryption-key: ${PLATFORM_TOKEN_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
