spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: test-secret-key-for-unit-tests-only

platform:
  token-encryption-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

youtube:
  client-id: test-client-id
  client-secret: test-client-secret
  redirect-uri: http://localhost:8080/api/v1/platforms/youtube/callback

app:
  mail:
    from: noreply@spring-project.local
  frontend:
    base-url: http://localhost:4200
  auth:
    access-token-expiry: 900
    refresh-token-expiry: 604800
    lockout-threshold: 5
    lockout-duration: 15
